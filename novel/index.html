<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黑潮纪元站点入口</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #111827, #0b1020 60%);
        color: #e5e7eb;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .panel {
        width: min(720px, 92vw);
        border: 1px solid #334155;
        border-radius: 14px;
        background: rgba(17, 24, 39, 0.9);
        padding: 20px 22px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        color: #94a3b8;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 10px;
        background: #1e3a8a;
        border: 1px solid #1d4ed8;
        color: #e2e8f0;
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
      }
      a:hover {
        border-color: #22d3ee;
      }
      code {
        background: #0a1325;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>黑潮纪元 · 世界观编辑站点</h1>
      <p>
        你现在访问的是站点入口页。请点击下方按钮进入配置与章节编辑器。
      </p>
      <a href="./viewer/">进入配置与章节编辑器</a>
      <p>
        本地调试地址建议：<code>http://localhost:8000/viewer/</code>
      </p>
    </main>
  </body>
</html>
